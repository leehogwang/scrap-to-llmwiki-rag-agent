<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipWiki</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        width: 340px;
        background: #08101d;
        color: #eff6ff;
      }

      .shell {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .title {
        display: grid;
        gap: 4px;
      }

      .title h1 {
        margin: 0;
        font-size: 1rem;
      }

      .title p {
        margin: 0;
        color: #93a7c3;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(15, 23, 42, 0.72);
        border-radius: 12px;
        padding: 12px;
      }

      .toggle-copy {
        display: grid;
        gap: 3px;
      }

      .toggle-copy strong {
        font-size: 0.85rem;
      }

      .toggle-copy span {
        color: #8ea3c2;
        font-size: 0.75rem;
        line-height: 1.4;
      }

      .switch {
        position: relative;
        width: 46px;
        height: 28px;
        flex: 0 0 auto;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: rgba(71, 85, 105, 0.8);
        transition: background 140ms ease;
      }

      .slider::before {
        content: '';
        position: absolute;
        left: 3px;
        top: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #f8fbff;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.35);
        transition: transform 140ms ease;
      }

      .switch input:checked + .slider {
        background: linear-gradient(135deg, #22d3ee, #0ea5e9);
      }

      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }

      .field label {
        font-size: 0.8rem;
        color: #d7e3f5;
        font-weight: 600;
      }

      .field input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(15, 23, 42, 0.82);
        color: #f8fbff;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 0.9rem;
      }

      .field input:focus {
        outline: none;
        border-color: rgba(103, 232, 249, 0.7);
        box-shadow: 0 0 0 3px rgba(103, 232, 249, 0.12);
      }

      .help {
        margin: 0;
        color: #8ea3c2;
        font-size: 0.76rem;
        line-height: 1.45;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .actions button,
      .single button {
        appearance: none;
        border: none;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 0.86rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
      }

      .actions button:active,
      .single button:active {
        transform: translateY(1px);
      }

      .primary {
        background: linear-gradient(135deg, #22d3ee, #0ea5e9);
        color: #04111f;
      }

      .secondary {
        background: rgba(15, 23, 42, 0.95);
        color: #dbeafe;
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .single {
        display: grid;
      }

      .status {
        min-height: 22px;
        font-size: 0.8rem;
        color: #93c5fd;
      }

      .status.ok {
        color: #5eead4;
      }

      .status.error {
        color: #fda4af;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.76rem;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="title">
        <h1>ClipWiki Capture</h1>
        <p><code>Alt + Drag</code>로 스크랩합니다. 백엔드 주소를 여기서 바꿀 수 있습니다.</p>
      </div>

      <div class="field">
        <label for="backendUrl">Backend URL</label>
        <input id="backendUrl" type="url" placeholder="http://222.116.135.238:3000" />
        <p class="help">로컬에서 쓰면 <code>http://localhost:3000</code>, 다른 PC에서 쓰면 서버 주소를 입력하세요.</p>
      </div>

      <div class="toggle">
        <div class="toggle-copy">
          <strong>메모 모드</strong>
          <span>캡처 후 우측 팝업에서 사용자 메모를 남긴 뒤 저장함.</span>
        </div>
        <label class="switch" for="memoMode">
          <input id="memoMode" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="actions">
        <button id="saveButton" class="primary" type="button">Save</button>
        <button id="testButton" class="secondary" type="button">Test connection</button>
      </div>

      <div class="single">
        <button id="openButton" class="secondary" type="button">Open dashboard</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
